apiVersion: v2
name: aemeath
description: A high-performance, extensible QQ Bot framework based on NapCat / OneBot 11 (Node.js)
type: application
version: 1.0.0
appVersion: '1.0.0'
keywords:
  - qq-bot
  - napcat
  - onebot
home: https://github.com/aemeath-projects/aemeath
maintainers:
  - name: Aemeath Team

dependencies:
  - name: postgresql
    version: '~16.4'
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: '~20.6'
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: redis
    version: '~20.6'
    repository: https://charts.bitnami.com/bitnami
    alias: redis-cache
    condition: redis-cache.enabled
  - name: minio
    version: '~17.0'
    repository: https://charts.bitnami.com/bitnami
    condition: minio.enabled
