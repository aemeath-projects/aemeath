# Aemeath Helm Chart - Default Values

# 全局镜像配置
image:
  repository: aemeath
  tag: '' # 默认使用 Chart appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ''
fullnameOverride: ''

# ServiceAccount
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ''

# 通用 Pod 配置
podAnnotations: {}
podLabels: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

# Bot (Fastify 主服务)
bot:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # 额外环境变量（key-value 列表）
  extraEnv: []

# BullMQ Worker
worker:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 384Mi
    limits:
      cpu: 500m
      memory: 768Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  extraEnv: []

# Service
service:
  type: ClusterIP
  port: 8000

# Ingress
ingress:
  enabled: false
  className: ''
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: aemeath.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: aemeath-tls
  #    hosts:
  #      - aemeath.local

# Autoscaling (仅 bot)
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# 应用配置 (写入 ConfigMap)
config:
  NODE_ENV: production
  NODE_OPTIONS: '--max-old-space-size=512'
  LOG_LEVEL: info
  LOG_FORMAT: json
  HOST: '0.0.0.0'
  PORT: '8000'
  METRICS_ENABLED: 'true'

  # NapCat 资源
  IMAGE_URL_TTL: '7200'
  ENABLE_RKEY_REFRESH: 'true'

  # PostgreSQL (如果使用内置子 chart，会自动覆盖)
  DB_POOL_SIZE: '10'
  IRIS_DB_POOL_SIZE: '5'

  # Redis / BullMQ
  # BULLMQ_REDIS_URL, CACHE_REDIS_URL 通过 secret 注入

# 敏感配置 (写入 Secret)
# 警告：以下默认值仅供本地开发使用，生产环境必须通过 existingSecret 引用外部 Secret，
# 或在 helm install/upgrade 时通过 --set secret.XXX=... 覆盖，切勿将明文密码提交到版本库。
secret:
  DATABASE_URL: 'postgresql://aemeath:aemeath@aemeath-postgresql:5432/aemeath'
  IRIS_DATABASE_URL: 'postgresql://aemeath:aemeath@aemeath-postgresql:5432/iris'
  BULLMQ_REDIS_URL: 'redis://aemeath-redis-master:6379'
  CACHE_REDIS_URL: 'redis://aemeath-redis-cache-master:6379'
  PERSISTENT_REDIS_URL: 'redis://aemeath-redis-master:6379'
  # S3 / MinIO（当 minio.enabled=true 时默认值自动对齐内置 MinIO 凭证和 Service URL）
  S3_ENDPOINT_URL: 'http://aemeath-minio:9000'
  S3_ACCESS_KEY_ID: 'minioadmin'
  S3_SECRET_ACCESS_KEY: 'minioadmin'
  S3_REGION: us-east-1
  S3_IRIS_BUCKET: aemeath-iris

# 使用已存在的 Secret（优先级高于上方 secret 块）
existingSecret: ''

# 健康检查
probes:
  liveness:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

# Bitnami PostgreSQL 子 chart
postgresql:
  enabled: true
  auth:
    username: aemeath
    password: aemeath
    database: aemeath
  primary:
    persistence:
      enabled: true
      size: 10Gi

# Bitnami Redis 子 chart（持久化实例：会话、RPC、锁、BullMQ）
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      size: 2Gi

# Bitnami Redis 子 chart（缓存实例：易失缓存，无持久化）
redis-cache:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: false
    extraArgs:
      - '--maxmemory-policy'
      - 'allkeys-lru'

# Bitnami MinIO 子 chart（对象存储：聊天归档、媒体文件）
# 生产环境建议使用外部 MinIO / S3，将 minio.enabled 设为 false 并通过 existingSecret 注入凭证
minio:
  enabled: true
  auth:
    rootUser: minioadmin
    rootPassword: minioadmin
  defaultBuckets: 'aemeath-chat-archive'
  persistence:
    enabled: true
    size: 20Gi
